name: Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.gitattributes'
      - '.gitignore'
      - 'LICENSE*'
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore JipperKeyViewer.slnx

      - name: Build JipperKeyViewer (AssetBundle)
        run: msbuild JipperKeyViewer\JipperKeyViewer.csproj /p:Configuration=Release /p:Platform="AnyCPU"

      - name: Build JipperKeyViewer-FileBased
        run: msbuild JipperKeyViewer-FileBased\JipperKeyViewer-FileBased.csproj /p:Configuration=Release /p:Platform="AnyCPU"

      - name: Package JipperKeyViewer (AssetBundle version)
        shell: pwsh
        run: |
          $dist = "dist\JipperKeyViewer"
          New-Item -ItemType Directory -Force -Path $dist\assets | Out-Null
          Copy-Item JipperKeyViewer\bin\Release\JipperKeyViewer.dll $dist\
          Copy-Item Info.json $dist\
          Copy-Item JipperKeyViewer\lang\ $dist\lang\ -Recurse
          Copy-Item JipperKeyViewer\assets\keyviewer_resources $dist\assets\

      - name: Package JipperKeyViewer-FileBased
        shell: pwsh
        run: |
          $dist = "dist\JipperKeyViewer-FileBased"
          New-Item -ItemType Directory -Force -Path $dist\assets | Out-Null
          Copy-Item JipperKeyViewer-FileBased\bin\Release\JipperKeyViewer-FileBased.dll $dist\
          Copy-Item JipperKeyViewer-FileBased\Info.json $dist\
          Copy-Item JipperKeyViewer\lang\ $dist\lang\ -Recurse
          Copy-Item JipperKeyViewer-FileBased\assets\* $dist\assets\

      - name: Upload JipperKeyViewer (AssetBundle)
        uses: actions/upload-artifact@v4
        with:
          name: JipperKeyViewer-AssetBundle
          path: dist/JipperKeyViewer/

      - name: Upload JipperKeyViewer-FileBased
        uses: actions/upload-artifact@v4
        with:
          name: JipperKeyViewer-FileBased
          path: dist/JipperKeyViewer-FileBased/
